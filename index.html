<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo Costa | Portifolio</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <meta name="description" content="Portifolio de Eduardo Costa, desenvolvedor Frond-End. Projetos, habilidades e contato.">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header__brand">
            <img class="header__logo" src="assets/images/logo-ea.png" alt="Logo EC">
        </div>
        <i id="toggleTheme" class="bi bi-sun"></i>
    </header>

    <nav>
        <ul class="menu menu--mobile">
            <li class="menu__item">
                <a class="menu__link active" href="#home">
                    <i class="menu__icon bi bi-house-door"></i>
                    <span class="menu__text">Home</span>
                </a>
            </li>

            <li class="menu__item">
                <a class="menu__link" href="#projetos">
                    <i class="menu__icon bi bi-window-stack"></i>
                    <span class="menu__text">Projetos</span>
                </a>
            </li>

            <li class="menu__item">
                <a class="menu__link" href="#sobre">
                    <i class="menu__icon bi bi-person"></i>
                    <span class="menu__text">Sobre</span>
                </a>
            </li>

            <li class="menu__item">
                <a class="menu__link" href="#contatos">
                    <i class="menu__icon bi bi-envelope"></i>
                    <span class="menu__text">Contatos</span>
                </a>
            </li>
        </ul>
    </nav>

</html>
